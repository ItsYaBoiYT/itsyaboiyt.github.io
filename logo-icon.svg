<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- ROOF -->
  <polygon points="10,108 100,28 190,108" fill="#b85c38"/>

  <!-- SHINGLE LINES -->
  <g stroke="rgba(0,0,0,0.18)" stroke-width="1.4">
    <line x1="10" y1="94" x2="100" y2="44"/><line x1="190" y1="94" x2="100" y2="44"/>
    <line x1="10" y1="80" x2="100" y2="60"/><line x1="190" y1="80" x2="100" y2="60"/>
    <line x1="22" y1="108" x2="100" y2="76"/><line x1="178" y1="108" x2="100" y2="76"/>
  </g>

  <!-- ROOF OUTLINE -->
  <polygon points="10,108 100,28 190,108" fill="none" stroke="#8f3d20" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- CHIMNEY -->
  <rect x="124" y="62" width="13" height="34" fill="#8f3d20"/>
  <rect x="121" y="57" width="19" height="8" fill="#7a3018"/>
  <!-- smoke -->
  <circle cx="130" cy="50" r="4" fill="rgba(212,188,150,0.35)"/>
  <circle cx="127" cy="42" r="2.8" fill="rgba(212,188,150,0.2)"/>
  <circle cx="132" cy="35" r="1.8" fill="rgba(212,188,150,0.1)"/>

  <!-- HOUSE BODY -->
  <rect x="28" y="107" width="144" height="70" fill="#243028" rx="1"/>

  <!-- DOOR -->
  <rect x="79" y="122" width="42" height="55" fill="#1c2820" rx="2"/>
  <line x1="100" y1="122" x2="100" y2="177" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="92" cy="150" r="2.5" fill="#d4bc96" opacity="0.9"/>

  <!-- WINDOWS -->
  <rect x="34" y="116" width="30" height="24" fill="#7bafc4" opacity="0.65" rx="2"/>
  <rect x="136" y="116" width="30" height="24" fill="#7bafc4" opacity="0.65" rx="2"/>
  <!-- panes -->
  <line x1="49" y1="116" x2="49" y2="140" stroke="rgba(255,255,255,0.35)" stroke-width="0.9"/>
  <line x1="34" y1="128" x2="64" y2="128" stroke="rgba(255,255,255,0.35)" stroke-width="0.9"/>
  <line x1="151" y1="116" x2="151" y2="140" stroke="rgba(255,255,255,0.35)" stroke-width="0.9"/>
  <line x1="136" y1="128" x2="166" y2="128" stroke="rgba(255,255,255,0.35)" stroke-width="0.9"/>

  <!-- GROUND LINE -->
  <line x1="18" y1="177" x2="182" y2="177" stroke="#4a6741" stroke-width="3" opacity="0.7"/>
  <!-- GRASS -->
  <g stroke="#4a6741" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="22" y1="177" x2="18" y2="170"/>
    <line x1="30" y1="177" x2="34" y2="171"/>
    <line x1="168" y1="177" x2="164" y2="171"/>
    <line x1="176" y1="177" x2="180" y2="170"/>
    <line x1="182" y1="177" x2="184" y2="173"/>
  </g>

</svg>
