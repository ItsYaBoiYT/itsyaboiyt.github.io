<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">

  <!-- ── BACKGROUND ── -->
  <rect width="520" height="180" fill="#1c2820" rx="6"/>

  <!-- ── SUBTLE BORDER ── -->
  <rect x="1" y="1" width="518" height="178" fill="none" stroke="rgba(212,188,150,0.15)" stroke-width="1" rx="6"/>

  <!-- ── TEXTURE LINES ── -->
  <line x1="0" y1="28" x2="520" y2="28" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="0" y1="152" x2="520" y2="152" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- ══════════════════════════════
       ROOF ICON
  ══════════════════════════════ -->
  <!-- glow -->
  <circle cx="78" cy="90" r="52" fill="rgba(184,92,56,0.08)"/>
  <circle cx="78" cy="90" r="46" fill="none" stroke="rgba(212,188,150,0.18)" stroke-width="1"/>

  <!-- house body -->
  <rect x="50" y="97" width="56" height="37" fill="#243028" rx="1"/>

  <!-- roof -->
  <polygon points="41,98 78,60 115,98" fill="#b85c38"/>
  <!-- shingle shadow lines -->
  <g stroke="rgba(0,0,0,0.18)" stroke-width="1.1">
    <line x1="41" y1="91" x2="78" y2="67"/><line x1="115" y1="91" x2="78" y2="67"/>
    <line x1="41" y1="84" x2="78" y2="74"/><line x1="115" y1="84" x2="78" y2="74"/>
    <line x1="47" y1="98" x2="78" y2="82"/><line x1="109" y1="98" x2="78" y2="82"/>
  </g>
  <!-- ridge highlight -->
  <line x1="41" y1="98" x2="115" y2="98" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- roof edge shadow -->
  <polygon points="41,98 78,60 115,98" fill="none" stroke="#8f3d20" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- chimney -->
  <rect x="87" y="69" width="9" height="22" fill="#8f3d20"/>
  <rect x="85" y="66" width="13" height="5" fill="#7a3018"/>
  <!-- chimney smoke dots -->
  <circle cx="91" cy="61" r="2.5" fill="rgba(212,188,150,0.2)"/>
  <circle cx="88" cy="55" r="1.8" fill="rgba(212,188,150,0.12)"/>

  <!-- door -->
  <rect x="67" y="109" width="22" height="25" fill="#1c2820" rx="1"/>
  <line x1="78" y1="109" x2="78" y2="134" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <circle cx="75" cy="121" r="1.4" fill="#d4bc96" opacity="0.8"/>

  <!-- windows -->
  <rect x="51" y="104" width="13" height="11" fill="#7bafc4" opacity="0.65" rx="1"/>
  <rect x="92" y="104" width="13" height="11" fill="#7bafc4" opacity="0.65" rx="1"/>
  <!-- window panes -->
  <line x1="57.5" y1="104" x2="57.5" y2="115" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
  <line x1="51" y1="109.5" x2="64" y2="109.5" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
  <line x1="98.5" y1="104" x2="98.5" y2="115" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
  <line x1="92" y1="109.5" x2="105" y2="109.5" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>

  <!-- ground -->
  <line x1="42" y1="134" x2="114" y2="134" stroke="#4a6741" stroke-width="2.2" opacity="0.6"/>
  <!-- grass -->
  <g stroke="#4a6741" stroke-width="1.4" stroke-linecap="round" opacity="0.6">
    <line x1="46" y1="134" x2="44" y2="130"/>
    <line x1="50" y1="134" x2="52" y2="130"/>
    <line x1="105" y1="134" x2="103" y2="130"/>
    <line x1="109" y1="134" x2="111" y2="130"/>
    <line x1="113" y1="134" x2="114" y2="131"/>
  </g>

  <!-- ══════════════════════════════
       DIVIDER LINE
  ══════════════════════════════ -->
  <line x1="138" y1="42" x2="138" y2="142" stroke="rgba(212,188,150,0.2)" stroke-width="1"/>

  <!-- ══════════════════════════════
       WORDMARK
  ══════════════════════════════ -->

  <!-- "YOUNG'S" large display -->
  <text
    x="156" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="900"
    fill="#f7f2e8"
    letter-spacing="3"
  >YOUNG'S</text>

  <!-- underline accent -->
  <rect x="156" y="88" width="200" height="1.5" fill="#b85c38" opacity="0.5" rx="1"/>

  <!-- "Roofing & Exteriors" italic serif -->
  <text
    x="158" y="116"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-style="italic"
    font-weight="700"
    fill="#b85c38"
    letter-spacing="0.8"
  >Roofing &amp; Exteriors</text>

  <!-- tagline -->
  <text
    x="158" y="138"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    font-weight="400"
    fill="#d4bc96"
    letter-spacing="3.5"
    opacity="0.75"
  >CO.  ·  METAIRIE, LOUISIANA</text>

  <!-- small moss dot accent -->
  <circle cx="148" cy="134" r="2.2" fill="#4a6741" opacity="0.65"/>

</svg>
